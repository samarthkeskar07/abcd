);

VALUES (1, 'Amit', DATE '2026-04-01', 'DBMS', 'I');

VALUES (2, 'Ravi', DATE '2026-04-10', 'Python', 'I');

    v_rollno Borrower.Rollin%TYPE;
    v_book Borrower.NameofBook%TYPE;
    v_date Borrower.DateofIssue%TYPE;

    v_days NUMBER;
    v_fine NUMBER := 0;

BEGIN

    v_book := '&Book_Name';

    SELECT DateofIssue 
    INTO v_date
    FROM Borrower
    WHERE Rollin = v_rollno
    AND NameofBook = v_book;

        v_fine := 0;
    END IF;

    IF v_fine > 0 THEN

        VALUES (v_rollno, SYSDATE, v_fine);
    END IF;

    UPDATE Borrower
    SET Status = 'R'
    WHERE Rollin = v_rollno
    AND NameofBook = v_book;

    DBMS_OUTPUT.PUT_LINE('Fine Amount = ' || v_fine);

    WHEN NO_DATA_FOUND THEN
        DBMS_OUTPUT.PUT_LINE('Record Not Found');
    WHEN OTHERS THEN
        DBMS_OUTPUT.PUT_LINE('Error Occurred');
END;

-- PROBLEM STATEMENT (MAIN)
-- =========================
-- Write a PL/SQL block using parameterized cursor to merge records 
-- from N_RollCall into O_RollCall. If record already exists, skip it.


-- =========================
-- TABLE CREATION
-- =========================

CREATE TABLE O_RollCall (
    Rollno NUMBER PRIMARY KEY,
    Name VARCHAR2(50)
);

CREATE TABLE N_RollCall (
    Rollno NUMBER,
    Name VARCHAR2(50)
);


-- =========================
-- SAMPLE DATA
-- =========================

INSERT INTO O_RollCall VALUES (1, 'Amit');
INSERT INTO O_RollCall VALUES (2, 'Ravi');

INSERT INTO N_RollCall VALUES (2, 'Ravi');
INSERT INTO N_RollCall VALUES (3, 'Neha');
INSERT INTO N_RollCall VALUES (4, 'Pooja');


-- =========================
-- PARAMETERIZED CURSOR
-- =========================

SET SERVEROUTPUT ON;

DECLARE

    CURSOR c1 IS 
        SELECT Rollno, Name FROM N_RollCall;

    CURSOR c2 (p_roll NUMBER) IS
        SELECT Rollno FROM O_RollCall WHERE Rollno = p_roll;

    v_roll NUMBER;
    v_name VARCHAR2(50);
    v_temp NUMBER;

BEGIN

    OPEN c1;

    LOOP
        FETCH c1 INTO v_roll, v_name;
        EXIT WHEN c1%NOTFOUND;

        OPEN c2(v_roll);
        FETCH c2 INTO v_temp;

        IF c2%NOTFOUND THEN
            INSERT INTO O_RollCall VALUES (v_roll, v_name);
            DBMS_OUTPUT.PUT_LINE('Inserted: ' || v_roll);
        ELSE
            DBMS_OUTPUT.PUT_LINE('Skipped: ' || v_roll);
        END IF;

        CLOSE c2;

    END LOOP;

    CLOSE c1;

END;
/
`

-- PROBLEM STATEMENT (STORED PROCEDURE)
-- =========================
-- Write a stored procedure proc_Grade to categorize students based on total marks 
-- and store the result in Result table.


-- =========================
-- TABLE CREATION
-- =========================

CREATE TABLE Stud_Marks (
    Roll NUMBER PRIMARY KEY,
    Name VARCHAR2(50),
    Total_marks NUMBER
);

CREATE TABLE Result (
    Roll NUMBER,
    Name VARCHAR2(50),
    Class VARCHAR2(50)
);


-- =========================
-- SAMPLE DATA
-- =========================

INSERT INTO Stud_Marks VALUES (1, 'Amit', 1200);
INSERT INTO Stud_Marks VALUES (2, 'Ravi', 950);
INSERT INTO Stud_Marks VALUES (3, 'Neha', 870);
INSERT INTO Stud_Marks VALUES (4, 'Pooja', 800);


-- =========================
-- STORED PROCEDURE
-- =========================

CREATE OR REPLACE PROCEDURE proc_Grade IS

    CURSOR c1 IS SELECT Roll, Name, Total_marks FROM Stud_Marks;

    v_roll Stud_Marks.Roll%TYPE;
    v_name Stud_Marks.Name%TYPE;
    v_marks Stud_Marks.Total_marks%TYPE;
    v_class VARCHAR2(50);

BEGIN

    OPEN c1;

    LOOP
        FETCH c1 INTO v_roll, v_name, v_marks;
        EXIT WHEN c1%NOTFOUND;

        IF v_marks BETWEEN 990 AND 1500 THEN
            v_class := 'Distinction';

        ELSIF v_marks BETWEEN 900 AND 989 THEN
            v_class := 'First Class';

        ELSIF v_marks BETWEEN 825 AND 899 THEN
            v_class := 'Higher Second Class';

        ELSE
            v_class := 'Fail';
        END IF;

        INSERT INTO Result VALUES (v_roll, v_name, v_class);

    END LOOP;

    CLOSE c1;

END;
/ 

-- =========================
-- CALL THE PROCEDURE (IMPORTANT)
-- =========================

BEGIN
    proc_Grade;
END;
/ 

-- =========================
-- DISPLAY OUTPUT
-- =========================

SELECT * FROM Result;`
