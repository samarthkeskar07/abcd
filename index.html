-- Write a PL/SQL block using parameterized cursor to merge records 
-- from N_RollCall into O_RollCall. If record already exists, skip it.


-- =========================
-- TABLE CREATION
-- =========================

CREATE TABLE O_RollCall (
    Rollno NUMBER PRIMARY KEY,
    Name VARCHAR2(50)
);

CREATE TABLE N_RollCall (
    Rollno NUMBER,
    Name VARCHAR2(50)
);


-- =========================
-- SAMPLE DATA
-- =========================

INSERT INTO O_RollCall VALUES (2, 'Ravi');

INSERT INTO N_RollCall VALUES (2, 'Ravi');
INSERT INTO N_RollCall VALUES (3, 'Neha');
INSERT INTO N_RollCall VALUES (4, 'Pooja');


-- =========================
-- PARAMETERIZED CURSOR
-- =========================

SET SERVEROUTPUT ON;

DECLARE

    CURSOR c1 IS 
        SELECT Rollno, Name FROM N_RollCall;

    CURSOR c2 (p_roll NUMBER) IS
        SELECT Rollno FROM O_RollCall WHERE Rollno = p_roll;

    v_roll NUMBER;
    v_name VARCHAR2(50);
    v_temp NUMBER;

BEGIN

    OPEN c1;

    LOOP
        FETCH c1 INTO v_roll, v_name;
        EXIT WHEN c1%NOTFOUND;

        OPEN c2(v_roll);
        FETCH c2 INTO v_temp;

        IF c2%NOTFOUND THEN
            INSERT INTO O_RollCall VALUES (v_roll, v_name);
            DBMS_OUTPUT.PUT_LINE('Inserted: ' || v_roll);
        ELSE
            DBMS_OUTPUT.PUT_LINE('Skipped: ' || v_roll);
        END IF;

        CLOSE c2;

    END LOOP;

    CLOSE c1;

END;
/

-- Write a stored procedure proc_Grade to categorize students based on total marks

-- =========================
-- TABLE CREATION
-- =========================

CREATE TABLE Stud_Marks (
    Roll NUMBER PRIMARY KEY,
    Name VARCHAR2(50),
    Total_marks NUMBER
);

CREATE TABLE Result (
    Roll NUMBER,
    Name VARCHAR2(50),
    Class VARCHAR2(50)
);

-- SAMPLE DATA

INSERT INTO Stud_Marks VALUES (2, 'Ravi', 950);
INSERT INTO Stud_Marks VALUES (3, 'Neha', 870);
INSERT INTO Stud_Marks VALUES (4, 'Pooja', 800);


-- =========================
-- STORED PROCEDURE
-- =========================

CREATE OR REPLACE PROCEDURE proc_Grade IS

    CURSOR c1 IS SELECT Roll, Name, Total_marks FROM Stud_Marks;

    v_roll Stud_Marks.Roll%TYPE;
    v_name Stud_Marks.Name%TYPE;
    v_marks Stud_Marks.Total_marks%TYPE;
    v_class VARCHAR2(50);

    OPEN c1;

    LOOP
        FETCH c1 INTO v_roll, v_name, v_marks;
        EXIT WHEN c1%NOTFOUND;

        IF v_marks BETWEEN 990 AND 1500 THEN

        ELSE
            v_class := 'Fail';
        END IF;

        INSERT INTO Result VALUES (v_roll, v_name, v_class);

    END LOOP;

    CLOSE c1;

-- =========================

    proc_Grade;
END;

-- PROBLEM STATEMENT (MAIN)
-- =========================
-- Write database trigger on Library table to track UPDATE and DELETE operations.

-- =========================
-- TABLE CREATION
-- =========================

CREATE TABLE Library (
    Book_id NUMBER PRIMARY KEY,
    Book_name VARCHAR2(50),
    Author VARCHAR2(50),
    Price NUMBER
);

CREATE TABLE Library_Audit (
    Book_id NUMBER,
    Book_name VARCHAR2(50),
    Author VARCHAR2(50),
    Price NUMBER,
    Operation VARCHAR2(10),
    Change_Date DATE
);

INSERT INTO Library VALUES (2, 'Python', 'Guido', 600);

-- =========================
-- TRIGGER (FIXED VERSION)
-- =========================

CREATE OR REPLACE TRIGGER trg_library_audit
BEFORE UPDATE OR DELETE ON Library
FOR EACH ROW

DECLARE
    v_operation VARCHAR2(10);

BEGIN

    IF UPDATING THEN
        v_operation := 'UPDATE';
    ELSIF DELETING THEN
        v_operation := 'DELETE';
    END IF;

    INSERT INTO Library_Audit
    VALUES (:OLD.Book_id, :OLD.Book_name, :OLD.Author, :OLD.Price,
            v_operation, SYSDATE);

END;

COMMIT;

-- =========================

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    const keywords = /\b(CREATE|TABLE|PRIMARY|KEY|VARCHAR2|NUMBER|INSERT|INTO|VALUES|SELECT|FROM|WHERE|UPDATE|DELETE|SET|OR|REPLACE|TRIGGER|AFTER|ON|FOR|EACH|ROW|BEGIN|END|PROCEDURE|CURSOR|OPEN|LOOP|FETCH|EXIT|WHEN|CLOSE|FOREIGN|REFERENCES|JOIN|INNER|LEFT|RIGHT|VIEW|INDEX|SEQUENCE|SYNONYM|ALTER|ADD|MODIFY|DROP|COLUMN|RENAME|TRUNCATE|NOT|NULL|UNIQUE|CHECK|CONSTRAINT|IN|AS|IS|START|WITH|INCREMENT|BY)\b/g;
    const types = /\b(Employee|Department|Emp_Log|Emp_View|Emp_Dept_View|Emp|DBMS_OUTPUT|AVG|MAX)\b/g;
    const strRe = /("[^"]*"|'[^']*')/g;
    const commentRe = /(\/\/.*$)/gm;
    const numberRe = /\b(\d+)\b/g;

    function highlightLine(line) {
      let html = escHtml(line);
      html = html.replace(commentRe, '<span class="comment">$1</span>');
      html = html.replace(strRe, '<span class="string">$1</span>');
      html = html.replace(keywords, '<span class="keyword">$1</span>');
      html = html.replace(types, '<span class="type">$1</span>');
      html = html.replace(numberRe, '<span class="number">$1</span>');
      return html;
    }

    function makeLines(code) {
      const lines = code.split('\n');
      return lines.map(l => {
        const has = keywords.test(l) || types.test(l);
        keywords.lastIndex = 0;
        types.lastIndex = 0;
        return `<div class="line${has ? ' has-keyword' : ''}">${highlightLine(l) || ' '}</div>`;
      }).join('');
    }

    function toggleTheme() {
      document.body.classList.toggle('light');
      const btn = document.querySelector('.theme-toggle');
      btn.textContent = document.body.classList.contains('light') ? 'Dark' : 'Light';
    }

    function copyCode(raw, btn) {
      navigator.clipboard.writeText(raw).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 1200);
      });
    }

    const row1 = document.getElementById('row1');
    const row2 = document.getElementById('row2');

    programs.forEach((p, i) => {

      const header = document.createElement('div');
      header.className = 'card-header';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = p.title;

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => copyCode(p.code, btn));

      header.appendChild(title);
      header.appendChild(btn);

      const codeWrap = document.createElement('div');
      codeWrap.className = 'code-container';
      codeWrap.innerHTML = '<pre>' + makeLines(p.code) + '</pre>';

      card.appendChild(header);
      card.appendChild(codeWrap);

      if (i < 5) row1.appendChild(card);
      else row2.appendChild(card);
    });
  </script>
</body>
</html>
